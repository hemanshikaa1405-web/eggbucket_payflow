<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign In | EggBucket PayFlow</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;">
        <div style="max-width:420px; width:100%;">
            <div style="text-align:center; margin-bottom:18px;">
                <div style="display:flex; justify-content:center; margin-bottom:14px;">
                    <img src="./assets/final-logo.png" alt="EggBucket PayFlow Logo"
                        style="width:90px; height:90px; object-fit:contain;">
                </div>
                <h1 style="margin:0;">Welcome!</h1>
                <p style="margin:6px 0 0 0; color:var(--text-muted);">Sign in to access EggBucket PayFlow</p>
            </div>

            <form id="login-form"
                style="background:var(--card-bg); padding:22px; border-radius:12px; box-shadow:var(--shadow);">
                <div class="form-group">
                    <label for="login-user">Username</label>
                    <input id="login-user" class="form-input" placeholder="Admin or Supervisor" required>
                </div>
                <div class="form-group">
                    <label for="login-pass">Password</label>
                    <input id="login-pass" type="password" class="form-input" placeholder="Enter your password"
                        required>
                </div>
                <div style="display:flex; gap:8px; justify-content:flex-end; align-items:center; margin-top:12px;">
                    <div>
                        <button type="submit" class="btn btn-primary btn-lg" id="sign-in-submit">Sign in</button>
                    </div>
                </div>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.1"></script>
    <script src="supabaseClient.js"></script>
    <script>
        const TOKEN_KEY = 'sc_token';
        const USER_KEY = 'sc_user';
        const form = document.getElementById('login-form');

        // Credential mapping: username -> { email, password, role, name }
        const CREDENTIALS = {
            'Admin': { email: 'admin@eggbucket.app', password: 'Admin123@', role: 'admin', name: 'Administrator' },
            'Supervisor': { email: 'supervisor@eggbucket.app', password: '6366929651', role: 'supervisor', name: 'Supervisor' }
        };

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('login-user').value.trim();
            const password = document.getElementById('login-pass').value.trim();
            if (!username || !password) return alert('Enter username and password');

            const cred = CREDENTIALS[username];
            if (!cred || cred.password !== password) {
                return alert('Invalid username or password');
            }

            const submitBtn = form.querySelector('button[type="submit"]');
            const origText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';

            try {
                const supabase = window.supabaseClient;
                if (!supabase) return alert('App not configured. Please refresh and try again.');

                const { data, error } = await supabase.auth.signInWithPassword({
                    email: cred.email,
                    password: cred.password
                });

                if (error) {
                    submitBtn.disabled = false;
                    submitBtn.textContent = origText;
                    return alert(error.message || 'Invalid username or password');
                }

                sessionStorage.setItem(TOKEN_KEY, data.session.access_token);
                sessionStorage.setItem(USER_KEY, JSON.stringify({
                    username: username,
                    name: cred.name,
                    role: cred.role,
                    id: data.user?.id
                }));

                const params = new URLSearchParams(window.location.search);
                let redirect = params.get('redirect') || 'index.html';
                if (cred.role === 'supervisor') {
                    redirect = 'calculator.html';
                } else if (redirect && (redirect.includes('dashboard') || redirect.includes('records'))) {
                    // Admin can go anywhere
                }
                window.location.href = redirect;
            } catch (err) {
                submitBtn.disabled = false;
                submitBtn.textContent = origText;
                alert(err.message || 'Login failed. Run: node scripts/seed-auth-users.js to create users.');
            }
        });
    </script>
</body>

</html>
