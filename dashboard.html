<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | EggBucket PayFlow</title>
    <meta name="description" content="Manage employees and view records.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Initialize Supabase globally -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>
    <script src="auth.js"></script>

    <!-- Header Navigation -->
    <div class="header-wrapper">
        <header class="header dashboard-header">
            <div class="logo">
                <div class="logo-icon">
                    <img src="assets/FINAL LOGO.png" alt="Egg Bucket Logo" class="logo-img" />
                </div>
                <span class="logo-text">EggBucket PayFlow</span>
            </div>

            <nav class="dash-nav">
                <!-- Dashboard/Employees link intentionally removed on non-index pages -->
                <a href="records.html" class="dash-nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    Records
                </a>
                <a href="calculator.html" class="dash-nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect>
                        <line x1="8" y1="6" x2="16" y2="6"></line>
                        <line x1="16" y1="14" x2="16.01" y2="14"></line>
                        <line x1="12" y1="14" x2="12.01" y2="14"></line>
                        <line x1="8" y1="14" x2="8.01" y2="14"></line>
                        <line x1="16" y1="18" x2="16.01" y2="18"></line>
                        <line x1="12" y1="18" x2="12.01" y2="18"></line>
                        <line x1="8" y1="18" x2="8.01" y2="18"></line>
                        <line x1="16" y1="10" x2="16.01" y2="10"></line>
                        <line x1="12" y1="10" x2="12.01" y2="10"></line>
                        <line x1="8" y1="10" x2="8.01" y2="10"></line>
                    </svg>
                    Calculator
                </a>
                <span style="margin-left: auto;"></span>
                <button id="logout-btn" class="btn btn-primary btn-sm" type="button" style="cursor: pointer;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    Logout
                </button>
            </nav>
        </header>
    </div>

    <!-- Main Content -->
    <main class="dashboard-main container">
        <div class="page-header">
            <div class="page-title-group">
                <h1 class="page-title">Employees</h1>
                <p class="page-subtitle">0 employees registered</p>
            </div>
            <a href="#" class="btn btn-primary btn-sm" id="add-employee-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                Add Employee
            </a>
        </div>

        <div class="employee-grid">
            <!-- Empty State -->
            <div class="empty-state"
                style="grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: var(--text-muted);">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                    style="margin-bottom: 16px; opacity: 0.5;">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
                <h3 style="font-size: 18px; font-weight: 600; color: var(--text-main); margin-bottom: 8px;">No employees
                    yet</h3>
                <p style="font-size: 14px;">Click "Add Employee" to get started.</p>
            </div>
        </div>
    </main>
    <!-- Add Employee Modal -->
    <div class="modal-backdrop" id="add-employee-modal">
        <div class="modal">
            <div class="modal-header">
                <h2>Add Employee</h2>
                <button class="modal-close" id="close-modal-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>

            <form id="add-employee-form">
                <div class="form-group">
                    <label for="emp-name">Name <span class="required">*</span></label>
                    <input type="text" id="emp-name" class="form-input" placeholder="Rajesh Kumar" required>
                </div>

                <div class="form-group">
                    <label for="emp-dept">Department</label>
                    <div class="select-wrapper">
                        <select id="emp-dept" class="form-input">
                            <option value="">Select a department</option>
                            <option value="Sales-cum-Delivery Fleet">Sales-cum-Delivery Fleet</option>
                            <option value="Customer AQ Fleet">Customer AQ Fleet</option>
                            <option value="Executive Supervisor's">Executive Supervisor's</option>
                            <option value="Interns">Interns</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="emp-phone">Phone</label>
                    <input type="text" id="emp-phone" class="form-input" placeholder="+91 98765 43210">
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="cancel-modal-btn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add Employee</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Application Logic -->
    <script src="app.js"></script>
    <script>
        document.getElementById('logout-btn').addEventListener('click', () => {
            sessionStorage.removeItem('sc_token');
            sessionStorage.removeItem('sc_user');
            window.location.href = 'login.html';
        });
    </script>
</body>

</html>
