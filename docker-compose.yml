services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: salescalc-api
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: 3000
    ports:
      - "3000:3000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: salescalc-web
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

